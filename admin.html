<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم AlBostan Store - تسجيل الدخول</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=El+Messiri:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --clay:#1F5E3B; --cream:#F5F7F5; --sand:#E8ECE9; --soil:#181A19; --white:#FFFFFF; --danger:#e63946; --success:#2ecc71; --warning:#f39c12;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg, var(--clay) 0%, #15452A 100%);color:var(--soil);padding:20px;line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-container{background:var(--white);border-radius:20px;padding:40px;max-width:400px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.2);}
  h1{font-family:'El Messiri',serif;color:var(--clay);font-size:1.8rem;margin-bottom:10px;text-align:center;}
  .logo{font-size:3rem;text-align:center;margin-bottom:20px;}
  .subtitle{text-align:center;color:#666;font-size:0.9rem;margin-bottom:30px;}
  .btn-login{width:100%;padding:14px;background:var(--clay);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;transition:background 0.3s;margin-bottom:12px;}
  .btn-login:hover{background:#15452A;}
  .info-box{background:var(--cream);border-right:4px solid var(--clay);padding:14px;border-radius:8px;font-size:0.85rem;color:var(--soil);margin-top:20px;line-height:1.6;}
  .info-box strong{color:var(--clay);}
  #statusMsg{padding:12px;border-radius:8px;font-weight:700;font-size:0.9rem;margin-bottom:14px;display:none;}
  #statusMsg.ok{display:block;background:#EAF7EF;color:var(--clay);}
  #statusMsg.err{display:block;background:#ffebef;color:var(--danger);}
  #statusMsg.loading{display:block;background:#e3f2fd;color:#1976d2;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #f3f3f3;border-top:2px solid var(--clay);border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;}
  @keyframes spin{0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);}}
  .admin-panel{display:none;}
  h1.admin-title{font-size:1.7rem;margin-bottom:18px;}
  h2{font-family:'El Messiri',serif;color:var(--clay);font-size:1.2rem;margin:24px 0 12px;}
  h3{font-family:'El Messiri',serif;color:var(--clay);font-size:1rem;margin:12px 0 8px;}
  .box{background:var(--white);border-radius:18px;padding:18px;margin-bottom:18px;box-shadow:0 4px 14px -8px rgba(31,94,59,.15);}
  .tabs{display:flex;gap:8px;margin-bottom:18px;border-bottom:2px solid var(--sand);flex-wrap:wrap;}
  .tab-btn{background:none;border:none;padding:10px 16px;font-weight:700;color:var(--soil);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;}
  .tab-btn.active{color:var(--clay);border-bottom-color:var(--clay);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  label{display:block;font-weight:700;font-size:.85rem;margin-bottom:5px;color:var(--soil);}
  input, select, textarea{
    width:100%;padding:10px 12px;border-radius:10px;border:2px solid var(--sand);
    font-family:inherit;font-size:.92rem;background:#fff;outline:none;margin-bottom:12px;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--clay);}
  textarea{resize:vertical;min-height:60px;}
  button{
    cursor:pointer;border:none;border-radius:10px;padding:10px 18px;font-weight:700;
    font-family:inherit;font-size:.9rem;background:var(--clay);color:#fff;transition:background .2s;
  }
  button:hover{background:#15452A;}
  button.danger{background:var(--danger);}
  button.danger:hover{background:#c52f3a;}
  button.secondary{background:var(--sand);color:var(--soil);}
  button.secondary:hover{background:#d3d9d5;}
  button.success{background:var(--success);}
  button.success:hover{background:#27ae60;}
  .form-row{display:flex;gap:12px;flex-wrap:wrap;}
  .form-row > div{flex:1;min-width:140px;}
  .user-info{background:var(--cream);padding:12px;border-radius:10px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
  .user-info span{font-weight:700;color:var(--clay);}
  .logout-btn{background:var(--danger);padding:8px 16px;font-size:0.85rem;}
  .logout-btn:hover{background:#c52f3a;}
  .product-row{display:flex;align-items:center;gap:12px;background:var(--cream);border-radius:14px;padding:10px 12px;margin-bottom:10px;}
  .prow-img{width:54px;height:54px;border-radius:10px;object-fit:cover;background:var(--sand);flex-shrink:0;}
  .prow-info{flex:1;font-size:.88rem;}
  .prow-actions{display:flex;gap:6px;flex-shrink:0;}
  .prow-actions button{padding:7px 12px;font-size:.82rem;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .stat-card{background:var(--white);border-radius:14px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
  .stat-value{font-size:1.8rem;font-weight:800;color:var(--clay);}
  .stat-label{font-size:0.85rem;color:var(--soil);margin-top:4px;}
  @media (max-width:680px){
    .form-row > div{min-width:100%;}
    .product-row{flex-wrap:wrap;}
    .tabs{flex-direction:column;}
    .login-container{padding:30px 20px;}
  }
</style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-container">
  <div class="logo">🔐</div>
  <h1>لوحة تحكم البستان</h1>
  <p class="subtitle">تسجيل دخول آمن عبر GitHub</p>
  
  <div id="statusMsg"></div>
  
  <button class="btn-login" id="githubLoginBtn">
    🐙 تسجيل الدخول عبر GitHub
  </button>
  
  <div class="info-box">
    <strong>🔒 آمن تماماً:</strong><br>
    لا نحفظ كلمات مرورك. تسجيل الدخول يتم مباشرة من GitHub.
  </div>
</div>

<!-- لوحة التحكم -->
<div id="adminPanel" class="admin-panel" style="width:100%;max-width:1200px;">
  <div class="box">
    <div class="user-info">
      <span id="userDisplay">👤 مرحباً</span>
      <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
    </div>
  </div>

  <div class="box">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('products')">📦 المنتجات</button>
      <button class="tab-btn" onclick="switchTab('sales')">📊 المبيعات</button>
      <button class="tab-btn" onclick="switchTab('stats')">📈 الإحصائيات</button>
    </div>

    <!-- تبويب المنتجات -->
    <div id="products" class="tab-content active">
      <h2 id="formTitle">➕ إضافة منتج جديد</h2>
      <input type="hidden" id="editIndex" value="-1">

      <div class="form-row">
        <div><label>الاسم (عربي) *</label><input id="f_nameAr"></div>
        <div><label>الاسم (إنجليزي) *</label><input id="f_nameEn"></div>
      </div>

      <div class="form-row">
        <div><label>السعر *</label><input type="number" id="f_price"></div>
        <div><label>السعر القديم</label><input type="number" id="f_oldPrice"></div>
        <div><label>الخصم</label><input id="f_discount"></div>
      </div>

      <div class="form-row">
        <div><label>الكمية</label><input type="number" id="f_quantity" value="0" min="0"></div>
        <div><label>التكلفة</label><input type="number" id="f_cost" min="0"></div>
      </div>

      <div class="form-row">
        <div><label>الوصف (عربي)</label><textarea id="f_descAr"></textarea></div>
        <div><label>الوصف (إنجليزي)</label><textarea id="f_descEn"></textarea></div>
      </div>

      <div class="form-row">
        <div>
          <label>صور المنتج (رفع مباشر - يمكن أكثر من صورة)</label>
          <input type="file" id="f_imageFiles" accept="image/*" multiple>
          <div id="f_imageGallery" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;"></div>
        </div>
        <div><label>إيموجي بديل (لو بدون صورة)</label><input id="f_emoji" placeholder="🛒"></div>
      </div>

      <div class="form-row">
        <div><button id="saveProductBtn">💾 حفظ المنتج</button></div>
        <div><button id="cancelEditBtn" class="secondary" style="display:none;">إلغاء</button></div>
      </div>

      <h2>📦 المنتجات (<span id="productCountLabel">0</span>)</h2>
      <div id="productsListArea" class="box"><p>جاري التحميل...</p></div>
    </div>

    <!-- تبويب المبيعات -->
    <div id="sales" class="tab-content">
      <h2>📊 تسجيل بيعة جديدة</h2>
      <div class="form-row">
        <div>
          <label>المنتج</label>
          <select id="s_productSelect">
            <option value="">-- اختر المنتج --</option>
          </select>
        </div>
        <div>
          <label>الكمية</label>
          <input type="number" id="s_quantity" value="1" min="1">
        </div>
        <div>
          <label>السعر</label>
          <input type="number" id="s_price">
        </div>
      </div>
      <button id="recordSaleBtn" class="success" style="width:100%;">✅ تسجيل البيعة</button>

      <h2 style="margin-top:30px;">📜 سجل العمليات</h2>
      <div id="salesListArea" class="box"><p>لا توجد مبيعات.</p></div>
    </div>

    <!-- تبويب الإحصائيات -->
    <div id="stats" class="tab-content">
      <h2>📈 الإحصائيات</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalSalesValue">0</div>
          <div class="stat-label">إجمالي المبيعات</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalProfitValue">0</div>
          <div class="stat-label">الأرباح</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalOrdersValue">0</div>
          <div class="stat-label">الطلبات</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const OAUTH_PROXY = 'https://albostan-oauth-proxy.vercel.app'; // سيتم تحديثه لاحقاً
  const CLIENT_ID = 'Ov23li6uFp3e8D6pqO64';
  const OWNER = 'hassansyrn-cmyk';
  const REPO = 'albostan-store';
  const BRANCH = 'main';
  const PRODUCTS_PATH = 'products.json';
  const SALES_PATH = 'sales_data.json';

  let accessToken = null;
  let products = [];
  let salesData = [];
  let productsFileSha = null;
  let salesFileSha = null;

  // ===== OAuth Functions =====
  function showStatus(msg, type = 'ok') {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = type;
  }

  function getStoredToken() {
    return localStorage.getItem('gh_access_token');
  }

  function setStoredToken(token) {
    localStorage.setItem('gh_access_token', token);
  }

  function clearStoredToken() {
    localStorage.removeItem('gh_access_token');
  }

  async function handleGitHubLogin() {
    try {
      showStatus('جاري إعادة التوجيه...', 'loading');
      
      // الخطوة 1: الحصول على رابط التفويض
      const response = await fetch(`${OAUTH_PROXY}/api/oauth?action=login&redirect_uri=${encodeURIComponent(window.location.href.split('?')[0])}`);
      const data = await response.json();
      
      if (data.authUrl) {
        window.location.href = data.authUrl;
      } else {
        showStatus('خطأ في الاتصال بـ GitHub', 'err');
      }
    } catch (e) {
      showStatus('خطأ: ' + e.message, 'err');
    }
  }

  async function handleOAuthCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    if (code) {
      try {
        showStatus('جاري التحقق...', 'loading');
        
        // الخطوة 2: تبديل الكود بـ Access Token
        const response = await fetch(`${OAUTH_PROXY}/api/oauth?action=callback&code=${code}`);
        const data = await response.json();

        if (data.access_token) {
          setStoredToken(data.access_token);
          accessToken = data.access_token;
          showLoginPanel();
          window.history.replaceState({}, document.title, window.location.pathname);
        } else {
          showStatus('فشل الحصول على التوكن', 'err');
        }
      } catch (e) {
        showStatus('خطأ: ' + e.message, 'err');
      }
    }
  }

  function showLoginPanel() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadUserInfo();
    loadProducts();
  }

  function showLogoutPanel() {
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
    clearStoredToken();
    accessToken = null;
  }

  async function loadUserInfo() {
    try {
      const response = await fetch(`${OAUTH_PROXY}/api/oauth?action=user&token=${accessToken}`);
      const user = await response.json();
      document.getElementById('userDisplay').textContent = `👤 مرحباً ${user.name || user.login}`;
    } catch (e) {
      console.error('Failed to load user info:', e);
    }
  }

  // ===== GitHub API Functions =====
  function ghHeaders() {
    return {
      'Authorization': `Bearer ${accessToken}`,
      'Accept': 'application/vnd.github+json'
    };
  }

  function b64DecodeUnicode(str) {
    const binary = atob(str.replace(/\n/g, ''));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
    return new TextDecoder('utf-8').decode(bytes);
  }

  function b64EncodeUnicode(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
  }

  async function loadProducts() {
    try {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PRODUCTS_PATH}?ref=${BRANCH}`, 
        { headers: ghHeaders() });
      
      if (res.status === 404) {
        products = [];
        renderProductsList();
        return;
      }

      if (!res.ok) throw new Error('Failed to load products');
      
      const data = await res.json();
      productsFileSha = data.sha;
      products = JSON.parse(b64DecodeUnicode(data.content));
      renderProductsList();
    } catch (e) {
      showStatus('خطأ في تحميل المنتجات: ' + e.message, 'err');
    }
  }

  async function saveProductsFile(commitMsg) {
    const content = b64EncodeUnicode(JSON.stringify(products, null, 2));
    const body = {
      message: commitMsg,
      content: content,
      branch: BRANCH
    };
    if (productsFileSha) body.sha = productsFileSha;

    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PRODUCTS_PATH}`, {
      method: 'PUT',
      headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) throw new Error('Failed to save products');
    const data = await res.json();
    productsFileSha = data.content.sha;
  }

  function renderProductsList() {
    document.getElementById('productCountLabel').textContent = products.length;
    
    const sSelect = document.getElementById('s_productSelect');
    sSelect.innerHTML = '<option value="">-- اختر المنتج --</option>' + 
      products.map((p, i) => `<option value="${i}">${p.nameAr} (${p.quantity || 0})</option>`).join('');

    const area = document.getElementById('productsListArea');
    if (products.length === 0) {
      area.innerHTML = '<p>لا توجد منتجات.</p>';
      return;
    }

    area.innerHTML = products.map((p, i) => `
      <div class="product-row">
        <div class="prow-info">
          <strong>${p.nameAr}</strong> / ${p.nameEn}<br>
          <span>${p.price} د.إ — ${p.quantity || 0} قطعة</span>
        </div>
        <div class="prow-actions">
          <button onclick="editProduct(${i})">تعديل</button>
          <button class="danger" onclick="deleteProduct(${i})">حذف</button>
        </div>
      </div>
    `).join('');
  }

  window.editProduct = function(i) {
    const p = products[i];
    document.getElementById('editIndex').value = i;
    document.getElementById('f_nameAr').value = p.nameAr || '';
    document.getElementById('f_nameEn').value = p.nameEn || '';
    document.getElementById('f_price').value = p.price || '';
    document.getElementById('f_quantity').value = p.quantity || 0;
    document.getElementById('f_cost').value = p.cost || '';
    document.getElementById('f_oldPrice').value = p.oldPrice || '';
    document.getElementById('f_discount').value = p.discount || '';
    document.getElementById('f_descAr').value = p.descAr || '';
    document.getElementById('f_descEn').value = p.descEn || '';
    document.getElementById('formTitle').textContent = '✏️ تعديل: ' + p.nameAr;
    document.getElementById('cancelEditBtn').style.display = 'inline-block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteProduct = async function(i) {
    if (!confirm('متأكد من الحذف؟')) return;
    const removed = products[i];
    products.splice(i, 1);
    try {
      await saveProductsFile('Delete: ' + (removed ? removed.nameEn : ''));
      renderProductsList();
      showStatus('تم الحذف بنجاح', 'ok');
    } catch (e) {
      products.splice(i, 0, removed);
      showStatus('خطأ: ' + e.message, 'err');
    }
  };

  function resetForm() {
    document.getElementById('editIndex').value = -1;
    ['f_nameAr', 'f_nameEn', 'f_price', 'f_quantity', 'f_cost', 'f_oldPrice', 'f_discount', 'f_descAr', 'f_descEn'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('formTitle').textContent = '➕ إضافة منتج جديد';
    document.getElementById('cancelEditBtn').style.display = 'none';
  }

  let selectedImages = [];

  function renderImageGallery() {
    const gallery = document.getElementById('f_imageGallery');
    gallery.innerHTML = selectedImages.map((img, idx) => `
      <div style="position:relative; width:80px; height:80px; border-radius:8px; overflow:hidden; background:#eee;">
        <img src="${img}" style="width:100%; height:100%; object-fit:cover;">
        <button onclick="removeImage(${idx})" style="position:absolute; top:2px; right:2px; background:red; color:white; border:none; width:20px; height:20px; border-radius:50%; font-size:12px; cursor:pointer;">×</button>
      </div>
    `).join('');
  }

  window.removeImage = function(idx) {
    selectedImages.splice(idx, 1);
    renderImageGallery();
  };

  async function uploadImage(file) {
    const reader = new FileReader();
    return new Promise((resolve, reject) => {
      reader.onload = async () => {
        try {
          const base64 = reader.result.split(',')[1];
          const safeName = Date.now() + '-' + Math.random().toString(36).substr(2,9) + '-' + file.name.replace(/[^a-zA-Z0-9.\-_]/g, '');
          const path = `images/${safeName}`;
          const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
            method: 'PUT',
            headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'Upload: ' + safeName, content: base64, branch: BRANCH })
          });
          if (!res.ok) throw new Error('Upload failed');
          resolve(path);
        } catch (e) { reject(e); }
      };
      reader.readAsDataURL(file);
    });
  }

  async function handleSaveProduct() {
    const nameAr = document.getElementById('f_nameAr').value.trim();
    const nameEn = document.getElementById('f_nameEn').value.trim();
    const price = document.getElementById('f_price').value.trim();

    if (!nameAr || !nameEn || !price) {
      showStatus('الحقول المطلوبة: الاسم والسعر', 'err');
      return;
    }

    const idx = Number(document.getElementById('editIndex').value);
    const product = {
      nameAr, nameEn, price,
      quantity: parseInt(document.getElementById('f_quantity').value) || 0,
      cost: document.getElementById('f_cost').value.trim() || '0',
      oldPrice: document.getElementById('f_oldPrice').value.trim(),
      discount: document.getElementById('f_discount').value.trim(),
      descAr: document.getElementById('f_descAr').value.trim(),
      descEn: document.getElementById('f_descEn').value.trim(),
      emoji: document.getElementById('f_emoji').value.trim() || '🛒',
      img: idx > -1 ? (products[idx].img || '') : '',
      images: idx > -1 && products[idx].images ? products[idx].images : []
    };

    try {
      showStatus('جاري الحفظ...', 'loading');
      const fileInput = document.getElementById('f_imageFiles');
      if (fileInput.files.length > 0) {
        const uploaded = [];
        for (let file of fileInput.files) {
          const path = await uploadImage(file);
          uploaded.push(path);
        }
        product.images = uploaded;
        product.img = uploaded[0];
      }

      if (idx > -1) {
        products[idx] = product;
      } else {
        products.push(product);
      }
      await saveProductsFile(idx > -1 ? 'Update: ' + nameEn : 'Add: ' + nameEn);
      showStatus('تم الحفظ بنجاح ✅', 'ok');
      resetForm();
      renderProductsList();
    } catch (e) {
      showStatus('خطأ: ' + e.message, 'err');
    }
  }

  document.getElementById('f_imageFiles').addEventListener('change', (e) => {
    const files = e.target.files;
    selectedImages = [];
    for(let file of files){
      const reader = new FileReader();
      reader.onload = (ev) => {
        selectedImages.push(ev.target.result);
        renderImageGallery();
      };
      reader.readAsDataURL(file);
    }
  });

  async function handleRecordSale() {
    const pIdx = document.getElementById('s_productSelect').value;
    const qty = parseInt(document.getElementById('s_quantity').value) || 0;

    if (pIdx === '' || qty <= 0) {
      showStatus('اختر منتج وأدخل كمية', 'err');
      return;
    }

    const product = products[pIdx];
    if ((product.quantity || 0) < qty) {
      if (!confirm('الكمية أكثر من المتوفر. متابعة؟')) return;
    }

    const price = parseFloat(document.getElementById('s_price').value) || parseFloat(product.price);
    const cost = parseFloat(product.cost) || 0;
    const total = price * qty;
    const profit = (price - cost) * qty;

    try {
      product.quantity = (parseInt(product.quantity) || 0) - qty;
      if (product.quantity < 0) product.quantity = 0;

      salesData.push({
        id: Date.now(),
        productName: product.nameAr,
        qty: qty,
        total: total.toFixed(2),
        profit: profit.toFixed(2),
        date: new Date().toISOString()
      });

      await saveProductsFile('Sale recorded');
      showStatus('تم تسجيل البيعة', 'ok');
      document.getElementById('s_quantity').value = 1;
      document.getElementById('s_price').value = '';
      renderProductsList();
      updateStats();
    } catch (e) {
      showStatus('خطأ: ' + e.message, 'err');
    }
  }

  function updateStats() {
    let totalSales = 0, totalProfit = 0, totalOrders = 0;
    salesData.forEach(s => {
      totalSales += parseFloat(s.total) || 0;
      totalProfit += parseFloat(s.profit) || 0;
      totalOrders++;
    });
    document.getElementById('totalSalesValue').textContent = totalSales.toFixed(2) + ' د.إ';
    document.getElementById('totalProfitValue').textContent = totalProfit.toFixed(2) + ' د.إ';
    document.getElementById('totalOrdersValue').textContent = totalOrders;
  }

  function switchTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
    if (tabName === 'stats') updateStats();
  }

  // ===== Event Listeners =====
  document.getElementById('githubLoginBtn').addEventListener('click', handleGitHubLogin);
  document.getElementById('logoutBtn').addEventListener('click', showLogoutPanel);
  document.getElementById('saveProductBtn').addEventListener('click', handleSaveProduct);
  document.getElementById('cancelEditBtn').addEventListener('click', resetForm);
  document.getElementById('recordSaleBtn').addEventListener('click', handleRecordSale);

  // ===== Initialization =====
  window.addEventListener('load', () => {
    const token = getStoredToken();
    if (token) {
      accessToken = token;
      showLoginPanel();
    }
    handleOAuthCallback();
  });
</script>

</body>
</html>
