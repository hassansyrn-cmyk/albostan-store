<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجري الإلكتروني | My Store</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    /* ==========================================
       1. CSS - التنسيقات الأساسية
       ========================================== */
    :root {
      --olive: #4A5D23;
      --sand: #EFE9DD;
      --soil: #3B2F2F;
      --white: #FFFFFF;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background-color: #faf9f6; color: var(--soil); }
    
    /* Header & Nav */
    header { background: var(--olive); color: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .header-actions { display: flex; gap: 15px; align-items: center; }
    button { cursor: pointer; border: none; background: transparent; }
    .lang-btn { color: var(--white); font-weight: bold; font-size: 1rem; }
    .cart-btn { position: relative; font-size: 1.2rem; color: var(--white); }
    .cart-badge { position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; font-weight: bold; }

    /* Main Container */
    main { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: flex; flex-direction: column; align-items: center; }

    /* Search Box */
    .search-box { width: 100%; max-width: 800px; margin-bottom: 10px; }
    .search-box input { width: 100%; padding: 12px 20px; border-radius: 50px; border: 2px solid var(--sand); font-size: 1rem; outline: none; transition: 0.2s; }
    .search-box input:focus { border-color: var(--olive); }

    /* Filter & Sort Controls (New) */
    .filter-controls-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; width: 100%; max-width: 800px; margin-bottom: 20px; }
    .price-filter-group { display: flex; align-items: center; gap: 8px; background: var(--white); padding: 6px 16px; border-radius: 50px; border: 2px solid var(--sand); }
    .price-filter-group label { font-size: 0.85rem; font-weight: 700; color: var(--olive); }
    .price-filter-group input { width: 70px; border: none; outline: none; background: transparent; font-weight: 600; font-size: 0.9rem; color: var(--soil); text-align: center; }
    .sort-box select { padding: 10px 20px; border-radius: 50px; border: 2px solid var(--sand); background: var(--white); font-weight: 700; font-size: 0.9rem; color: var(--olive); outline: none; cursor: pointer; }

    /* Category Filters */
    .filter-cats { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; width: 100%; }
    .cat-btn { padding: 8px 16px; border-radius: 50px; border: 2px solid var(--olive); background: var(--white); color: var(--olive); font-weight: 600; transition: 0.3s; }
    .cat-btn.active, .cat-btn:hover { background: var(--olive); color: var(--white); }

    /* Products Grid */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; }
    .no-results { display: none; text-align: center; width: 100%; font-size: 1.2rem; color: #888; margin-top: 20px; }

    /* Product Card */
    .prod-card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px var(--shadow); transition: transform 0.2s; cursor: pointer; display: flex; flex-direction: column; }
    .prod-card:hover { transform: translateY(-5px); }
    .prod-thumb { height: 200px; background: var(--sand); display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .prod-img { width: 100%; height: 100%; object-fit: cover; }
    .prod-emoji-fallback { font-size: 4rem; display: none; }
    .prod-body { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
    .prod-cat { font-size: 0.8rem; color: var(--olive); margin-bottom: 5px; font-weight: bold; }
    .prod-body h4 { font-size: 1.1rem; margin-bottom: 10px; }
    
    /* Product Meta (Stars & Sales) */
    .prod-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.85rem; }
    .prod-stars { color: #ffb100; font-weight: 700; letter-spacing: 1px; }
    .prod-sales-count { color: var(--olive); opacity: 0.8; font-weight: 600; }

    .prod-foot { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
    .price { font-weight: 900; font-size: 1.1rem; color: var(--olive); }
    .add-btn { background: var(--olive); color: var(--white); width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
    .add-btn:hover { background: var(--soil); }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal-box { background: var(--white); width: 100%; max-width: 500px; border-radius: 16px; overflow: hidden; position: relative; }
    .close-modal { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.8); border-radius: 50%; width: 30px; height: 30px; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; z-index: 2; }
    .modal-img-container { height: 250px; background: var(--sand); display: flex; justify-content: center; align-items: center; }
    .modal-img-container img { width: 100%; height: 100%; object-fit: cover; }
    .modal-body { padding: 20px; text-align: center; }
    .modal-title { font-size: 1.5rem; margin-bottom: 10px; color: var(--soil); }
    
    /* Modal Meta */
    .modal-meta-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; font-size: 0.95rem; }
    .modal-stars { color: #ffb100; font-weight: 700; }
    .modal-sales { color: var(--olive); font-weight: 600; }

    .modal-price { font-size: 1.3rem; font-weight: bold; color: var(--olive); margin-bottom: 15px; }
    .modal-desc { font-size: 0.95rem; color: #555; margin-bottom: 20px; line-height: 1.5; }
    .modal-add-btn { width: 100%; background: var(--olive); color: var(--white); padding: 12px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
    .modal-add-btn:hover { background: var(--soil); }

    @media (max-width: 680px) {
      .filter-controls-row { flex-direction: column; align-items: stretch; }
      .price-filter-group { justify-content: space-between; }
      .sort-box select { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <h2 data-ar="متجري" data-en="My Store">متجري</h2>
    </div>
    <div class="header-actions">
      <button class="lang-btn" id="langToggle">EN</button>
      <button class="cart-btn" id="cartBtn">
        🛒 <span class="cart-badge" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث عن منتج..." data-ar-placeholder="ابحث عن منتج..." data-en-placeholder="Search for a product...">
    </div>

    <div class="filter-controls-row">
      <div class="price-filter-group">
        <label data-ar="السعر من:" data-en="Min Price:">السعر من:</label>
        <input type="number" id="minPriceInput" placeholder="0" min="0">
        <label data-ar="إلى:" data-en="To:">إلى:</label>
        <input type="number" id="maxPriceInput" placeholder="∞" min="0">
      </div>
      
      <div class="sort-box">
        <select id="sortSelect" aria-label="ترتيب المنتجات">
          <option value="default" data-ar="الترتيب الافتراضي" data-en="Default Sorting">الترتيب الافتراضي</option>
          <option value="price-asc" data-ar="السعر: من الأقل للأعلى" data-en="Price: Low to High">السعر: من الأقل للأعلى</option>
          <option value="price-desc" data-ar="السعر: من الأعلى للأقل" data-en="Price: High to Low">السعر: من الأعلى للأقل</option>
          <option value="sales" data-ar="الأكثر مبيعاً" data-en="Best Sellers">الأكثر مبيعاً</option>
          <option value="rating" data-ar="الأعلى تقييماً" data-en="Top Rated">الأعلى تقييماً</option>
          <option value="newest" data-ar="الأحدث وصولاً" data-en="Newest Items">الأحدث وصولاً</option>
        </select>
      </div>
    </div>

    <div class="filter-cats" id="categoryContainer">
      <button class="cat-btn active" data-cat="all" data-ar="الكل" data-en="All">الكل</button>
      <button class="cat-btn" data-cat="electronics" data-ar="إلكترونيات" data-en="Electronics">إلكترونيات</button>
      <button class="cat-btn" data-cat="fashion" data-ar="أزياء" data-en="Fashion">أزياء</button>
    </div>

    <p class="no-results" id="noResultsMsg" data-ar="لا توجد منتجات تطابق بحثك." data-en="No products match your search.">لا توجد منتجات تطابق بحثك.</p>

    <div class="products-grid" id="productGrid">
      </div>
  </main>

  <div class="modal-overlay" id="productModal">
    <div class="modal-box">
      <button class="close-modal" id="closeModal">×</button>
      <div class="modal-img-container">
        <img id="mImg" src="" alt="Product">
      </div>
      <div class="modal-body">
        <h3 class="modal-title" id="mTitle"></h3>
        
        <div class="modal-meta-row">
          <span class="modal-stars" id="mStars">★★★★☆ 4.5</span>
          <span class="modal-sales" id="mSales" data-ar="تم بيع 0 قطعة" data-en="0 sold">تم بيع 0 قطعة</span>
        </div>

        <p class="modal-price" id="mPrice"></p>
        <p class="modal-desc" id="mDesc"></p>
        <button class="modal-add-btn" id="mAddBtn" data-ar="أضف إلى السلة" data-en="Add to Cart">أضف إلى السلة</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // المتغيرات العامة
    // ==========================================
    let currentLang = 'ar';
    let currentCategory = 'all';
    let currentSearchQuery = '';
    let cartItems = [];
    let currentModalProduct = null;

    // ==========================================
    // 1. نظام اللغات (اللغتين العربية والإنجليزية)
    // ==========================================
    const langToggleBtn = document.getElementById('langToggle');
    langToggleBtn.addEventListener('click', () => {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      langToggleBtn.textContent = currentLang === 'ar' ? 'EN' : 'AR';
      document.documentElement.lang = currentLang;
      document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
      applyLanguage();
    });

    function applyLanguage() {
      // النصوص الثابتة والأزرار
      document.querySelectorAll('[data-ar]').forEach(el => {
        if(el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
          el.placeholder = el.getAttribute(`data-${currentLang}-placeholder`) || el.getAttribute(`data-${currentLang}`);
        } else {
          el.textContent = el.getAttribute(`data-${currentLang}`);
        }
      });
      
      // تحديث واجهة المنتجات المعروضة بناءً على اللغة
      filterProducts();
    }

    // ==========================================
    // 2. دوال مساعدة (تقييم النجوم) (جديد)
    // ==========================================
    function generateStarsVisual(rating) {
      const score = parseFloat(rating) || 4.5;
      const rounded = Math.round(score);
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        stars += (i <= rounded) ? '★' : '☆';
      }
      return `${stars} ${score.toFixed(1)}`;
    }

    // ==========================================
    // 3. جلب المنتجات من Google Sheets
    // ==========================================
    async function loadProductsFromSheet() {
      // تنبيه: ضع رابط API الخاص بـ Google Sheet هنا
      // const sheetURL = "YOUR_GOOGLE_SHEET_API_URL";
      
      // بيانات تجريبية لمحاكاة استجابة جوجل شيت (للتأكد من عمل الكود)
      const mockProducts = [
        { id: 1, nameAr: "سماعة بلوتوث", nameEn: "Bluetooth Headphone", price: 150, categoryAr: "إلكترونيات", categoryEn: "electronics", descAr: "صوت نقي وبطارية تدوم طويلاً", descEn: "Clear sound and long battery", img: "https://via.placeholder.com/200", rating: 4.8, sales: 1245, createdAt: "2023-01-10" },
        { id: 2, nameAr: "تيشيرت قطني", nameEn: "Cotton T-Shirt", price: 50, categoryAr: "أزياء", categoryEn: "fashion", descAr: "قطن 100% مريح جداً", descEn: "100% cotton very comfortable", img: "https://via.placeholder.com/200", rating: 4.2, sales: 850, createdAt: "2023-05-15" },
        { id: 3, nameAr: "ساعة ذكية", nameEn: "Smart Watch", price: 299, categoryAr: "إلكترونيات", categoryEn: "electronics", descAr: "تتبع نشاطك الرياضي", descEn: "Track your fitness activity", img: "https://via.placeholder.com/200", rating: "", sales: "", createdAt: "2023-08-20" }
      ];
      
      renderProductsFromSheet(mockProducts);
    }

    // ==========================================
    // 4. عرض المنتجات ودمج البيانات الجديدة
    // ==========================================
    function renderProductsFromSheet(products) {
      const grid = document.getElementById('productGrid');
      if(!grid) return;
      grid.innerHTML = '';

      products.forEach(p => {
        // تفعيل القيم الافتراضية
        const ratingVal = (p.rating && String(p.rating).trim() !== '') ? parseFloat(p.rating) : 4.5;
        const salesVal = (p.sales && String(p.sales).trim() !== '') ? parseInt(p.sales) : 0;
        const createdAtVal = p.createdAt || '';

        const card = document.createElement('div');
        card.className = 'prod-card';
        card.dataset.nameAr = p.nameAr || '';
        card.dataset.nameEn = p.nameEn || '';
        card.dataset.price = p.price || '0';
        card.dataset.categoryEn = p.categoryEn || '';
        card.dataset.descAr = p.descAr || '';
        card.dataset.descEn = p.descEn || '';
        card.dataset.img = p.img || '';
        card.dataset.rating = ratingVal;
        card.dataset.sales = salesVal;
        card.dataset.createdAt = createdAtVal;

        const priceVal = p.price || '0';
        const starsMarkup = generateStarsVisual(ratingVal);
        const textSales = currentLang === 'ar' ? `تم بيع ${salesVal} قطعة` : `${salesVal} sold`;

        card.innerHTML = `
          <div class="prod-thumb">
            <img src="${p.img}" alt="" class="prod-img">
          </div>
          <div class="prod-body">
            <p class="prod-cat" data-ar="${p.categoryAr}" data-en="${p.categoryEn}">${currentLang === 'ar' ? p.categoryAr : p.categoryEn}</p>
            <h4 data-ar="${p.nameAr}" data-en="${p.nameEn}">${currentLang === 'ar' ? p.nameAr : p.nameEn}</h4>
            
            <div class="prod-meta-row">
              <span class="prod-stars">${starsMarkup}</span>
              <span class="prod-sales-count" data-ar="تم بيع ${salesVal} قطعة" data-en="${salesVal} sold">${textSales}</span>
            </div>

            <div class="prod-foot">
              <span class="price" data-ar="${priceVal} د.إ" data-en="${priceVal} AED">${currentLang === 'ar' ? priceVal + ' د.إ' : priceVal + ' AED'}</span>
              <button class="add-btn" aria-label="أضف للسلة" onclick="event.stopPropagation(); addToCart();">+</button>
            </div>
          </div>`;
          
        card.addEventListener('click', () => openModal(card.dataset));
        grid.appendChild(card);
      });

      filterProducts();
    }

    // ==========================================
    // 5. محرك الفلترة (يشمل البحث، التصنيف، والسعر)
    // ==========================================
    function filterProducts() {
      const productCards = document.querySelectorAll('.prod-card');
      let visibleCount = 0;
      
      const minPrice = parseFloat(document.getElementById('minPriceInput').value) || 0;
      const maxPrice = parseFloat(document.getElementById('maxPriceInput').value) || Infinity;

      productCards.forEach(card => {
        const nameAr = card.dataset.nameAr.toLowerCase();
        const nameEn = card.dataset.nameEn.toLowerCase();
        const catEn = card.dataset.categoryEn;
        const price = parseFloat(card.dataset.price) || 0;

        const matchesSearch = nameAr.includes(currentSearchQuery) || nameEn.includes(currentSearchQuery);
        const matchesCategory = currentCategory === 'all' || catEn === currentCategory;
        const matchesPrice = price >= minPrice && price <= maxPrice;

        if(matchesSearch && matchesCategory && matchesPrice){
          card.style.display = 'flex';
          
          // تحديث النصوص لتتوافق مع اللغة الحالية أثناء الفلترة
          card.querySelector('.prod-cat').textContent = card.dataset[currentLang === 'ar' ? 'ar' : 'en'] || card.querySelector('.prod-cat').getAttribute(`data-${currentLang}`);
          card.querySelector('h4').textContent = card.dataset[currentLang === 'ar' ? 'nameAr' : 'nameEn'];
          card.querySelector('.price').textContent = card.querySelector('.price').getAttribute(`data-${currentLang}`);
          card.querySelector('.prod-sales-count').textContent = card.querySelector('.prod-sales-count').getAttribute(`data-${currentLang}`);
          
          visibleCount++;
        } else {
          card.style.display = 'none';
        }
      });

      document.getElementById('noResultsMsg').style.display = visibleCount === 0 ? 'block' : 'none';
      sortProducts();
    }

    // ==========================================
    // 6. نظام الترتيب (الفرز) (جديد)
    // ==========================================
    function sortProducts() {
      const grid = document.getElementById('productGrid');
      if (!grid) return;
      const cards = Array.from(grid.querySelectorAll('.prod-card'));
      const sortVal = document.getElementById('sortSelect').value;

      if (sortVal === 'default') return;

      cards.sort((a, b) => {
        if (sortVal === 'price-asc') {
          return (parseFloat(a.dataset.price) || 0) - (parseFloat(b.dataset.price) || 0);
        } else if (sortVal === 'price-desc') {
          return (parseFloat(b.dataset.price) || 0) - (parseFloat(a.dataset.price) || 0);
        } else if (sortVal === 'sales') {
          return (parseInt(b.dataset.sales) || 0) - (parseInt(a.dataset.sales) || 0);
        } else if (sortVal === 'rating') {
          return (parseFloat(b.dataset.rating) || 0) - (parseFloat(a.dataset.rating) || 0);
        } else if (sortVal === 'newest') {
          const dateA = new Date(a.dataset.createdAt || 0);
          const dateB = new Date(b.dataset.createdAt || 0);
          return dateB - dateA; 
        }
        return 0;
      });

      cards.forEach(card => grid.appendChild(card));
    }

    // ==========================================
    // 7. النافذة المنبثقة (Modal)
    // ==========================================
    const modal = document.getElementById('productModal');
    
    function openModal(data) {
      currentModalProduct = data;
      updateModalContent();
      modal.style.display = 'flex';
    }

    function updateModalContent() {
      if(!currentModalProduct) return;
      const data = currentModalProduct;
      
      document.getElementById('mImg').src = data.img;
      document.getElementById('mTitle').textContent = currentLang === 'ar' ? data.nameAr : data.nameEn;
      document.getElementById('mDesc').textContent = currentLang === 'ar' ? data.descAr : data.descEn;
      
      const priceText = currentLang === 'ar' ? `${data.price} د.إ` : `${data.price} AED`;
      document.getElementById('mPrice').textContent = priceText;

      // تحديث بيانات النجوم والمبيعات
      const ratingVal = data.rating ? parseFloat(data.rating) : 4.5;
      const salesVal = data.sales ? parseInt(data.sales) : 0;
      
      document.getElementById('mStars').textContent = generateStarsVisual(ratingVal);
      const modalSales = document.getElementById('mSales');
      modalSales.textContent = currentLang === 'ar' ? `تم بيع ${salesVal} قطعة` : `${salesVal} sold`;
      modalSales.setAttribute('data-ar', `تم بيع ${salesVal} قطعة`);
      modalSales.setAttribute('data-en', `${salesVal} sold`);
    }

    document.getElementById('closeModal').addEventListener('click', () => { modal.style.display = 'none'; });
    window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

    // ==========================================
    // 8. السلة (Cart)
    // ==========================================
    function addToCart() {
      cartItems.push(1);
      document.getElementById('cartCount').textContent = cartItems.length;
      // يمكنك إضافة وظائف السلة المتقدمة هنا
    }

    // ==========================================
    // 9. مستمعو الأحداث (Event Listeners)
    // ==========================================
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearchQuery = e.target.value.toLowerCase();
      filterProducts();
    });

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentCategory = e.target.dataset.cat;
        filterProducts();
      });
    });

    document.getElementById('minPriceInput').addEventListener('input', filterProducts);
    document.getElementById('maxPriceInput').addEventListener('input', filterProducts);
    document.getElementById('sortSelect').addEventListener('change', sortProducts);

    // ==========================================
    // التهيئة عند تحميل الصفحة
    // ==========================================
    window.onload = () => {
      loadProductsFromSheet();
    };

  </script>
</body>
</html>
