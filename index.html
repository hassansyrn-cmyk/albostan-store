<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر البستان - AlBostan Store</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* التنسيقات العامة للموقع */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: #fbf8f3; /* اللون العاجي (البيج الناعم) المريح للعين */
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* الهيدر / شريط التنقل العلوي */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: transparent;
            position: absolute;
            width: 100%;
            top: 0;
            right: 0;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 700;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #2e7d32; /* يتغير للون الأخضر عند تمرير الماوس */
        }

        .header-logo img {
            height: 45px;
            width: auto;
            mix-blend-mode: multiply; /* دمج خلفية اللوغو العلوية */
        }

        /* قسم الواجهة الرئيسية (Hero Section) */
        .hero-section {
            padding: 140px 5% 60px 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hero-content {
            max-width: 600px;
            margin-bottom: 35px;
        }

        .hero-subtitle {
            color: #8d99ae;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .hero-title {
            font-size: 30px;
            font-weight: 800;
            color: #1a1a1a;
            line-height: 1.4;
            margin-bottom: 18px;
        }

        .hero-description {
            font-size: 14px;
            color: #555555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 12px 26px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-dark {
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #1a1a1a;
        }

        .btn-dark:hover {
            background-color: #333333;
            border-color: #333333;
        }

        .btn-outline {
            background-color: transparent;
            color: #1a1a1a;
            border: 1px solid #1a1a1a;
        }

        .btn-outline:hover {
            background-color: #1a1a1a;
            color: #ffffff;
        }

        /* [تعديل أساسي] حاوية اللوغو المدمجة مع الدائرة الخضراء */
        .hero-logo-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
            display: flex;
            justify-content: center;  /* توسيط اللوغو أفقياً بنسبة 100% */
            align-items: center;      /* توسيط اللوغو عمودياً بنسبة 100% */
        }

        /* الدائرة الخضراء المضيئة في الخلفية */
        .hero-green-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #e8f5e9;      /* نفس درجة اللون الأخضر الهادئ لشعارك */
            border-radius: 50%;
            filter: blur(20px);       /* تأثير التوهج الضبابي الناعم */
            opacity: 0.85;
            z-index: 1;               /* تبقى بالخلف */
        }

        /* صورة شعار المتجر فوق الدائرة مباشرة */
        .hero-logo-img {
            position: relative;
            max-width: 80%;           /* حجم اللوغو ليكون متناسقاً داخل حدود الدائرة */
            height: auto;
            z-index: 2;               /* تظهر فوق الدائرة دائماً */
            mix-blend-mode: multiply;  /* إخفاء الخلفية البيضاء للشعار لتندمج بالكامل */
        }

        /* قسم أقسام المتجر السفلي */
        .categories-section {
            background-color: #ffffff;
            padding: 50px 5%;
            border-top-left-radius: 35px;
            border-top-right-radius: 35px;
            text-align: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.02);
        }

        .section-subtitle {
            font-size: 13px;
            color: #8d99ae;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 35px;
        }

        .categories-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 950px;
            margin: 0 auto;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
            text-decoration: none;
            color: #1a1a1a;
        }

        .category-circle {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #f4efe8; /* لون خلفية الدوائر الصغيرة المطابق للتصميم */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* تأثير حركي رائع عند تمرير الماوس فوق القسم */
        .category-item:hover .category-circle {
            transform: translateY(-5px);
            background-color: #e8f5e9;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .category-name {
            font-size: 13px;
            font-weight: 700;
        }

        /* الفوتر / أسفل الموقع */
        footer {
            background-color: #fbf8f3;
            padding: 35px 5%;
            text-align: center;
            border-top: 1px solid #f4efe8;
        }

        .footer-logo-img {
            height: 55px;
            width: auto;
            mix-blend-mode: multiply;
            margin-bottom: 12px;
        }

        .footer-text {
            font-size: 12px;
            color: #8d99ae;
        }

        /* شاشات الكمبيوتر والأجهزة اللوحية العريضة لإعطاء مظهر متوازن ومتجاور */
        @media (min-width: 768px) {
            .hero-section {
                flex-direction: row-reverse;
                justify-content: space-between;
                text-align: right;
                padding: 160px 8% 80px 8%;
                max-width: 1200px;
                margin: 0 auto;
                gap: 5%;
