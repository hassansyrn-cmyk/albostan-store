تمت الإضافة للسلة ✅

<!-- (باقي HTML كما هو بدون تغيير) -->

<script>
/* =================== اللغة =================== */
let currentLang = 'ar';
const T = {
  ar: { emptyCart: 'السلة فاضية، أضف منتجات من المتجر 🛍️', currency: 'د.إ' },
  en: { emptyCart: 'Your cart is empty, add some products 🛍️', currency: 'AED' }
};

function applyLanguage(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

  document.querySelectorAll('[data-ar]').forEach(el => {
    el.textContent = lang === 'ar' ? el.dataset.ar : el.dataset.en;
  });
  document.querySelectorAll('[data-ar-placeholder]').forEach(el => {
    el.placeholder = lang === 'ar' ? el.dataset.arPlaceholder : el.dataset.enPlaceholder;
  });

  document.getElementById('langToggle').textContent = lang === 'ar' ? 'EN' : 'AR';
  renderCart();
}

document.getElementById('langToggle').addEventListener('click', () => {
  applyLanguage(currentLang === 'ar' ? 'en' : 'ar');
});

/* =================== السلة (✅ محفوظة) =================== */
let cart = JSON.parse(localStorage.getItem('albostan_cart')) || [];

const cartCountEl = document.getElementById('cartCount');
const cartItemsList = document.getElementById('cartItemsList');
const cartTotalEl = document.getElementById('cartTotal');
const cartDrawer = document.getElementById('cartDrawer');
const cartOverlay = document.getElementById('cartOverlay');

function renderCart(){
  cartCountEl.textContent = cart.length;
  const cur = T[currentLang].currency;

  if(cart.length === 0){
    cartItemsList.innerHTML = `<p class="cart-empty">${T[currentLang].emptyCart}</p>`;
    cartTotalEl.textContent = `0 ${cur}`;
    localStorage.setItem('albostan_cart', JSON.stringify(cart));
    return;
  }

  let total = 0;
  cartItemsList.innerHTML = cart.map((item, index) => {
    total += item.price;
    const name = currentLang === 'ar' ? item.nameAr : item.nameEn;
    return `
      <div class="cart-line">
        <span class="ci-emoji">${item.emoji}</span>
        <div class="ci-info">
          <h5>${name}</h5>
          <span>${item.price} ${cur}</span>
        </div>
        <button class="ci-remove" data-index="${index}">×</button>
      </div>`;
  }).join('');

  cartTotalEl.textContent = `${total} ${cur}`;
  localStorage.setItem('albostan_cart', JSON.stringify(cart));

  document.querySelectorAll('.ci-remove').forEach(btn => {
    btn.onclick = () => {
      cart.splice(btn.dataset.index, 1);
      renderCart();
    };
  });
}

/* =================== Toast =================== */
const toast = document.getElementById('toast');
function showToast(){
  toast.style.opacity = '1';
  setTimeout(() => toast.style.opacity = '0', 1500);
}

/* =================== إضافة للسلة =================== */
document.querySelectorAll('.add-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const card = btn.closest('.prod-card');
    cart.push({
      nameAr: card.dataset.nameAr,
      nameEn: card.dataset.nameEn,
      price: +card.dataset.price,
      emoji: card.dataset.emoji
    });
    renderCart();
    showToast();
  });
});

/* =================== فتح / إغلاق السلة =================== */
document.getElementById('cartBtn').onclick = () => {
  cartDrawer.classList.add('open');
  cartOverlay.classList.add('open');
};
document.getElementById('cartClose').onclick =
cartOverlay.onclick = () => {
  cartDrawer.classList.remove('open');
  cartOverlay.classList.remove('open');
};

const accountDropdown = document.getElementById('accountDropdown');

  e.stopPropagation();
  accountDropdown.classList.toggle('open');
};
